<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>英文單字捕手</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--sky-top:#5EC4FF;--sky-bottom:#CFF3FF;--grass:#3FB27F;--grass-dark:#2E8F63;--coral:#FF6B5E;--coral-dark:#E5493D;--ink:#28344D;--card:#FFFFFF;--sun:#FFD54A;font-size:16px;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{margin:0;font-family:'Nunito',sans-serif;color:var(--ink);background:linear-gradient(180deg,var(--sky-top) 0%,var(--sky-bottom) 55%,#EFFBEA 100%);overflow:hidden;height:100vh;width:100vw;position:fixed;inset:0;}
  h1,h2,.display{font-family:'Fredoka',sans-serif;}

  
  
  
  
  
  

  #app{height:100%;width:100%;display:flex;flex-direction:column;position:relative;padding-top:44px;}
  .cloud{position:absolute;background:#fff;border-radius:50%;opacity:0.8;}
  .cloud.c1{width:90px;height:36px;top:6%;left:8%;}.cloud.c1::before{content:"";position:absolute;width:50px;height:50px;background:#fff;border-radius:50%;top:-22px;left:10px;}
  .cloud.c2{width:70px;height:28px;top:14%;right:12%;}.cloud.c2::before{content:"";position:absolute;width:40px;height:40px;background:#fff;border-radius:50%;top:-16px;left:8px;}
  .screen{position:absolute;inset:0;top:44px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow-y:auto;}
  [hidden]{display:none !important;}
  #startScreen .title-wrap{text-align:center;margin-bottom:18px;}
  #startScreen h1{font-size:clamp(26px,6vw,42px);color:var(--ink);margin:0 0 4px;text-shadow:0 3px 0 rgba(255,255,255,0.6);}
  #startScreen .subtitle{font-weight:700;color:#3B5170;font-size:clamp(12px,2.4vw,15px);}
  .panel{background:var(--card);border-radius:24px;padding:22px clamp(16px,4vw,32px);box-shadow:0 14px 0 rgba(43,58,85,0.08),0 20px 40px rgba(43,58,85,0.15);max-width:640px;width:100%;}
  .section-label{font-family:'Fredoka',sans-serif;font-size:15px;font-weight:600;color:var(--grass-dark);margin:0 0 10px;display:flex;align-items:center;gap:6px;}
  .level-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
  .level-card{border:3px solid transparent;background:#F4F8FF;border-radius:18px;padding:12px 6px 10px;text-align:center;cursor:pointer;transition:transform .12s ease,border-color .12s ease,background .12s ease;}
  .level-card:hover{transform:translateY(-2px);}
  .level-card.selected{border-color:var(--grass);background:#E6F8EE;}
  .level-card .emojis{font-size:clamp(18px,5vw,26px);line-height:1.1;}
  .level-card .lv-name{font-weight:800;font-size:clamp(12px,3vw,14px);margin-top:4px;}
  .level-card .lv-desc{font-size:clamp(9px,2.4vw,11px);color:#6A7893;margin-top:2px;}
  .speed-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px;}
  .speed-card{border:3px solid transparent;background:#FFF6E8;border-radius:18px;padding:10px 6px;text-align:center;cursor:pointer;font-weight:800;font-family:'Fredoka',sans-serif;font-size:clamp(13px,3vw,15px);transition:transform .12s ease,border-color .12s ease;}
  .speed-card:hover{transform:translateY(-2px);}
  .speed-card.selected{border-color:var(--sun);background:#FFEFC7;}
  .speed-card .sp-icon{font-size:18px;display:block;margin-bottom:2px;}
  .btn{font-family:'Fredoka',sans-serif;font-weight:600;border:none;border-radius:16px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:transform .08s ease;}
  .btn:active{transform:translateY(2px);}
  .btn-primary{background:var(--grass);color:#fff;box-shadow:0 5px 0 var(--grass-dark);font-size:18px;padding:14px 20px;width:100%;}
  .btn-secondary{background:#EDF1F8;color:var(--ink);box-shadow:0 4px 0 #C9D2E3;font-size:15px;padding:11px 16px;}

  #gameScreen{padding:0;justify-content:flex-start;}
  #hud{width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 12px;background:rgba(255,255,255,0.55);backdrop-filter:blur(4px);flex:0 0 auto;}
  .hud-pill{background:#fff;border-radius:999px;padding:6px 12px;font-family:'Fredoka',sans-serif;font-weight:600;font-size:clamp(12px,3.2vw,15px);box-shadow:0 3px 0 rgba(43,58,85,0.1);display:flex;align-items:center;gap:6px;white-space:nowrap;}
  #timePill.low{background:#FFE1DE;color:var(--coral-dark);}
  .hud-right{display:flex;gap:6px;}
  .icon-btn{background:#fff;border:none;border-radius:12px;width:34px;height:34px;font-size:16px;box-shadow:0 3px 0 rgba(43,58,85,0.1);cursor:pointer;}
  #refPanel{width:100%;flex:0 0 auto;background:rgba(255,255,255,0.45);padding:6px 10px 8px;display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .ref-item{flex:0 0 auto;background:#fff;border-radius:14px;padding:6px 10px;text-align:center;box-shadow:0 3px 0 rgba(43,58,85,0.08);cursor:pointer;border:2px solid transparent;min-width:52px;transition:transform .1s ease,border-color .3s ease;}
  .ref-item:active{transform:scale(0.94);}
  .ref-item.playing{border-color:var(--sun);transform:scale(1.06);}
  .ref-item .re{font-size:20px;display:block;}
  .ref-item .rw{font-size:10px;font-weight:700;color:#5A6784;display:block;margin-top:1px;}
  #playAreaWrap{flex:1 1 auto;width:100%;position:relative;overflow:hidden;background:linear-gradient(180deg,#8FD6FF 0%,#DFF6FF 70%,#EAFBE4 100%);}
  #laneLayer{position:absolute;inset:0;display:flex;flex-direction:column;}
  .lane{flex:1 1 0;border-bottom:2px dashed rgba(255,255,255,0.55);position:relative;}
  .lane:nth-child(odd){background:rgba(255,255,255,0.35);}
  .lane:nth-child(even){background:rgba(255,255,255,0.15);}
  .lane:last-child{border-bottom:none;}
  #playAreaTrack{position:absolute;inset:0;touch-action:none;}
  .flying-icon{position:absolute;display:flex;align-items:center;justify-content:center;font-size:clamp(26px,7vw,44px);width:12%;filter:drop-shadow(0 3px 3px rgba(0,0,0,0.15));will-change:left;user-select:none;pointer-events:none;}
  .flying-icon.pop-correct{animation:popCorrect .45s ease forwards;}
  .flying-icon.pop-wrong{animation:popWrong .45s ease forwards;}
  @keyframes popCorrect{0%{transform:scale(1);}40%{transform:scale(1.5) rotate(10deg);}100%{transform:scale(0) rotate(20deg);opacity:0;}}
  @keyframes popWrong{0%{transform:scale(1);}30%{transform:scale(1.15) rotate(-8deg);}60%{transform:scale(0.9) rotate(8deg);}100%{transform:scale(0);opacity:0;}}
  #net{position:absolute;right:2%;width:11%;display:flex;align-items:center;justify-content:center;font-size:clamp(28px,7.5vw,48px);transition:top .13s cubic-bezier(.34,1.56,.64,1);filter:drop-shadow(0 4px 4px rgba(0,0,0,0.2));pointer-events:none;}
  #feedbackFlash{position:absolute;top:14px;left:50%;transform:translateX(-50%);font-family:'Fredoka',sans-serif;font-weight:700;font-size:clamp(16px,5vw,26px);padding:6px 18px;border-radius:999px;background:#fff;box-shadow:0 6px 0 rgba(43,58,85,0.12);opacity:0;pointer-events:none;transition:opacity .15s ease,transform .15s ease;white-space:nowrap;z-index:5;}
  #feedbackFlash.show{opacity:1;transform:translateX(-50%) translateY(4px);}
  #feedbackFlash.good{color:var(--grass-dark);}
  #feedbackFlash.bad{color:var(--coral-dark);}
  #bottomControls{flex:0 0 auto;display:flex;align-items:center;justify-content:center;gap:10px;padding:8px 12px calc(10px + env(safe-area-inset-bottom));background:rgba(255,255,255,0.55);}
  .mobile-arrow{width:56px;height:44px;border-radius:14px;border:none;background:#fff;box-shadow:0 4px 0 rgba(43,58,85,0.12);font-size:20px;cursor:pointer;}
  .mobile-arrow:active{transform:translateY(3px);box-shadow:none;}
  #bottomControls .hint{font-size:12px;font-weight:700;color:#4A5A78;flex:1;text-align:center;}
  #endScreen .panel{text-align:center;}
  #resultEmoji{font-size:52px;margin-bottom:6px;}
  #resultScore{font-family:'Fredoka',sans-serif;font-size:clamp(28px,8vw,42px);font-weight:700;color:var(--grass-dark);margin:4px 0;}
  #resultSub{color:#5A6784;font-weight:700;margin-bottom:18px;font-size:14px;}
  .end-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
  @media(max-width:520px){.level-grid,.speed-grid{gap:7px;}.level-card,.speed-card{padding:8px 4px;}#hud{padding:7px 8px;}}

  #wc-timer-toggle:checked + span { background: #3FB27F; }
  #wc-timer-toggle:checked + span span { transform: translateX(20px); }
</style>

<div id="app">
  <div class="cloud c1"></div><div class="cloud c2"></div>
  <div id="startScreen" class="screen">
    <div class="title-wrap">
      <h1>🎯 英文單字捕手</h1>
      <div class="subtitle">聽英文、接對圖案，輕鬆練習單字！</div>
    </div>
    <div class="panel">
      <p class="section-label">🎚️ 選擇難度</p>
      <div class="level-grid" id="levelGrid"></div>
      <p class="section-label">🚀 移動速度</p>
      <div class="speed-grid" id="speedGrid">
        <div class="speed-card" data-speed="1.35"><span class="sp-icon">🐢</span>慢</div>
        <div class="speed-card selected" data-speed="1"><span class="sp-icon">🚶</span>中</div>
        <div class="speed-card" data-speed="0.72"><span class="sp-icon">🐇</span>快</div>
      </div>
      
      <div style="display:flex;align-items:center;justify-content:space-between;background:#F4F8FF;border:1.5px solid #D0E8FF;border-radius:12px;padding:12px 16px;margin-bottom:20px;">
        <div>
          <div style="font-size:13px;font-weight:700;color:#28344D;">⏱ 60 秒計時</div>
          <div style="font-size:11px;color:#6A7893;margin-top:2px;">關閉後無限時間，想接幾顆接幾顆</div>
        </div>
        <label style="position:relative;display:inline-block;width:44px;height:24px;flex-shrink:0;">
          <input type="checkbox" id="wc-timer-toggle" checked style="opacity:0;width:0;height:0;">
          <span style="position:absolute;cursor:pointer;inset:0;background:#ccc;border-radius:24px;transition:.3s;">
            <span style="position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s;box-shadow:0 1px 3px rgba(0,0,0,.2);"></span>
          </span>
        </label>
      </div>
<button class="btn btn-primary" id="startBtn">▶ 開始遊戲</button>
    </div>
  </div>
  <div id="gameScreen" class="screen" hidden>
    <div id="hud">
      <div class="hud-pill" id="timePill">⏱ <span id="timeVal">60</span>s</div>
      <div class="hud-pill">⭐ <span id="scoreVal">0</span>/<span id="roundVal">0</span></div>
      <div class="hud-right">
        <button class="icon-btn" id="replayWordBtn" title="再念一次">🔊</button>
        <button class="icon-btn" id="quitBtn">✖</button>
      </div>
    </div>
    <div id="refPanel"></div>
    <div id="playAreaWrap">
      <div id="laneLayer"></div>
      <div id="playAreaTrack"></div>
      <div id="net">🥅</div>
      <div id="feedbackFlash"></div>
    </div>
    <div id="bottomControls">
      <button class="mobile-arrow" id="upBtn">▲</button>
      <div class="hint">拖曳 / 上下鍵 移動網子</div>
      <button class="mobile-arrow" id="downBtn">▼</button>
    </div>
  </div>
  <div id="endScreen" class="screen" hidden>
    <div class="panel">
      <div id="resultEmoji">🏆</div>
      <div id="resultScore">0 / 0</div>
      <div id="resultSub">答對率</div>
      <div class="end-btns">
        <button class="btn btn-primary" id="retryBtn" style="width:auto;">🔁 再玩一次</button>
        <button class="btn btn-secondary" id="changeLevelBtn">🎚️ 更換難度</button>
      </div>
    </div>
  </div>
</div>
<script>
(function(){
  "use strict";
  const LEVELS={1:{name:"初級",desc:"apple・cat・dog",baseCross:5200,words:[{word:"apple",emoji:"🍎"},{word:"cat",emoji:"🐱"},{word:"dog",emoji:"🐶"},{word:"sun",emoji:"☀️"},{word:"star",emoji:"⭐"},{word:"car",emoji:"🚗"},{word:"book",emoji:"📕"},{word:"fish",emoji:"🐟"},{word:"ball",emoji:"⚽"},{word:"hat",emoji:"🎩"},{word:"bird",emoji:"🐦"},{word:"egg",emoji:"🥚"},{word:"cup",emoji:"☕"},{word:"tree",emoji:"🌳"},{word:"moon",emoji:"🌙"}],lanes:3},2:{name:"中級",desc:"banana・tiger・rabbit",baseCross:4200,words:[{word:"banana",emoji:"🍌"},{word:"elephant",emoji:"🐘"},{word:"tiger",emoji:"🐯"},{word:"monkey",emoji:"🐒"},{word:"flower",emoji:"🌸"},{word:"chair",emoji:"🪑"},{word:"milk",emoji:"🥛"},{word:"bread",emoji:"🍞"},{word:"shoe",emoji:"👟"},{word:"rabbit",emoji:"🐰"},{word:"duck",emoji:"🦆"},{word:"frog",emoji:"🐸"},{word:"lion",emoji:"🦁"},{word:"snake",emoji:"🐍"},{word:"grape",emoji:"🍇"}],lanes:4},3:{name:"高級",desc:"butterfly・rainbow・dolphin",baseCross:3400,words:[{word:"butterfly",emoji:"🦋"},{word:"rainbow",emoji:"🌈"},{word:"umbrella",emoji:"☂️"},{word:"mountain",emoji:"⛰️"},{word:"bicycle",emoji:"🚲"},{word:"dolphin",emoji:"🐬"},{word:"penguin",emoji:"🐧"},{word:"strawberry",emoji:"🍓"},{word:"pineapple",emoji:"🍍"},{word:"airplane",emoji:"✈️"},{word:"chocolate",emoji:"🍫"},{word:"dinosaur",emoji:"🦕"},{word:"kangaroo",emoji:"🦘"},{word:"watermelon",emoji:"🍉"},{word:"octopus",emoji:"🐙"},{word:"spider",emoji:"🕷️"}],lanes:5}};
  const GAME_SECONDS=60,MAX_ROUNDS=30,ROUND_TIMEOUT_MS=10000,CORRECT_WAIT_MS=2000,NET_ZONE_PCT=78;
  let selectedLevel=1,speedMultiplier=1,levelData,wordPool,lanes,crossDuration;
  let netLane=0,score=0,roundsPlayed=0,timeLeft=GAME_SECONDS;
  let roundTarget=null,lastTargetWord=null,activeIcons=[],respawnTimers=[];
  let roundTimeoutId=null,correctAdvanceId=null,gameTimerId=null,rafId=null;
  let dragging=false,audioCtx=null,roundActive=false;
  const $=id=>document.getElementById(id);
  const startScreen=$("startScreen"),gameScreen=$("gameScreen"),endScreen=$("endScreen");
  const levelGrid=$("levelGrid"),speedGrid=$("speedGrid"),startBtn=$("startBtn");
  const timeVal=$("timeVal"),timePill=$("timePill"),scoreVal=$("scoreVal"),roundVal=$("roundVal");
  const refPanel=$("refPanel"),laneLayer=$("laneLayer"),playAreaTrack=$("playAreaTrack"),netEl=$("net"),feedbackFlash=$("feedbackFlash");
  const upBtn=$("upBtn"),downBtn=$("downBtn"),replayWordBtn=$("replayWordBtn"),quitBtn=$("quitBtn");
  const resultEmoji=$("resultEmoji"),resultScore=$("resultScore"),resultSub=$("resultSub");
  const retryBtn=$("retryBtn"),changeLevelBtn=$("changeLevelBtn");

  function buildLevelCards(){levelGrid.innerHTML="";Object.keys(LEVELS).forEach(key=>{const lv=LEVELS[key];const sample=lv.words.slice(0,3).map(w=>w.emoji).join(" ");const card=document.createElement("div");card.className="level-card"+(Number(key)===selectedLevel?" selected":"");card.dataset.level=key;card.innerHTML=`<div class="emojis">${sample}</div><div class="lv-name">Lv.${key} ${lv.name}</div><div class="lv-desc">${lv.desc}</div>`;card.addEventListener("click",()=>{selectedLevel=Number(key);[...levelGrid.children].forEach(c=>c.classList.remove("selected"));card.classList.add("selected");});levelGrid.appendChild(card);});}
  buildLevelCards();
  [...speedGrid.children].forEach(card=>{card.addEventListener("click",()=>{speedMultiplier=Number(card.dataset.speed);[...speedGrid.children].forEach(c=>c.classList.remove("selected"));card.classList.add("selected");if(levelData)crossDuration=levelData.baseCross*speedMultiplier;});});

  function ensureAudio(){if(!audioCtx){const AC=window.AudioContext||window.webkitAudioContext;if(AC)audioCtx=new AC();}if(audioCtx&&audioCtx.state==="suspended")audioCtx.resume();}
  function playTone(type){if(!audioCtx)return;const now=audioCtx.currentTime;const osc=audioCtx.createOscillator(),gain=audioCtx.createGain();osc.connect(gain);gain.connect(audioCtx.destination);if(type==="correct"){osc.type="sine";osc.frequency.setValueAtTime(523,now);osc.frequency.setValueAtTime(659,now+0.09);osc.frequency.setValueAtTime(784,now+0.18);gain.gain.setValueAtTime(0.0001,now);gain.gain.exponentialRampToValueAtTime(0.25,now+0.02);gain.gain.exponentialRampToValueAtTime(0.0001,now+0.5);osc.start(now);osc.stop(now+0.52);}else if(type==="wrong"){osc.type="sawtooth";osc.frequency.setValueAtTime(220,now);osc.frequency.exponentialRampToValueAtTime(90,now+0.28);gain.gain.setValueAtTime(0.0001,now);gain.gain.exponentialRampToValueAtTime(0.2,now+0.02);gain.gain.exponentialRampToValueAtTime(0.0001,now+0.32);osc.start(now);osc.stop(now+0.34);}else if(type==="tick"){osc.type="square";osc.frequency.setValueAtTime(880,now);gain.gain.setValueAtTime(0.0001,now);gain.gain.exponentialRampToValueAtTime(0.08,now+0.01);gain.gain.exponentialRampToValueAtTime(0.0001,now+0.1);osc.start(now);osc.stop(now+0.11);}else if(type==="end"){osc.stop&&osc.stop();[523,659,784,1047].forEach((f,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type="sine";const t=now+i*0.14;o.frequency.setValueAtTime(f,t);g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(0.22,t+0.02);g.gain.exponentialRampToValueAtTime(0.0001,t+0.3);o.start(t);o.stop(t+0.32);});}}

  let voices=[];
  function loadVoices(){voices=window.speechSynthesis?window.speechSynthesis.getVoices():[];}
  if(window.speechSynthesis){loadVoices();window.speechSynthesis.onvoiceschanged=loadVoices;}
  function speak(word){if(!("speechSynthesis" in window))return;window.speechSynthesis.cancel();const utter=new SpeechSynthesisUtterance(word);utter.lang="en-US";utter.rate=0.82;utter.pitch=1.05;const v=voices.find(v=>v.lang&&v.lang.toLowerCase().startsWith("en"));if(v)utter.voice=v;window.speechSynthesis.speak(utter);}

  function buildRefPanel(){refPanel.innerHTML="";wordPool.forEach(w=>{const item=document.createElement("div");item.className="ref-item";item.innerHTML=`<span class="re">${w.emoji}</span><span class="rw">${w.word}</span>`;item.addEventListener("click",()=>{ensureAudio();speak(w.word);item.classList.add("playing");setTimeout(()=>item.classList.remove("playing"),700);});refPanel.appendChild(item);});}
  function buildLanes(){laneLayer.innerHTML="";for(let i=0;i<lanes;i++){const lane=document.createElement("div");lane.className="lane";laneLayer.appendChild(lane);}}
  function updateNet(){netEl.style.top=(netLane*(100/lanes))+"%";netEl.style.height=(100/lanes)+"%";}
  function setNetFromY(clientY){const rect=playAreaTrack.getBoundingClientRect();const relY=clientY-rect.top;let lane=Math.floor(relY/(rect.height/lanes));lane=Math.max(0,Math.min(lanes-1,lane));if(lane!==netLane){netLane=lane;updateNet();}}
  playAreaTrack.addEventListener("pointerdown",e=>{dragging=true;setNetFromY(e.clientY);});
  window.addEventListener("pointermove",e=>{if(dragging)setNetFromY(e.clientY);});
  window.addEventListener("pointerup",()=>{dragging=false;});
  window.addEventListener("pointercancel",()=>{dragging=false;});
  document.addEventListener("keydown",e=>{if(gameScreen.hidden)return;if(e.key==="ArrowUp"){e.preventDefault();netLane=Math.max(0,netLane-1);updateNet();}if(e.key==="ArrowDown"){e.preventDefault();netLane=Math.min(lanes-1,netLane+1);updateNet();}});
  upBtn.addEventListener("click",()=>{netLane=Math.max(0,netLane-1);updateNet();});
  downBtn.addEventListener("click",()=>{netLane=Math.min(lanes-1,netLane+1);updateNet();});

  function updateHUD(){timeVal.textContent=timeLeft;timePill.classList.toggle("low",timeLeft<=10);scoreVal.textContent=score;roundVal.textContent=roundsPlayed;}
  function showFeedback(kind){feedbackFlash.classList.remove("good","bad");feedbackFlash.textContent=kind==="good"?"✅ Great!":"❌ Try again";feedbackFlash.classList.add("show",kind==="good"?"good":"bad");clearTimeout(showFeedback._t);showFeedback._t=setTimeout(()=>feedbackFlash.classList.remove("show"),700);}

  function pickWord(ex){let pool=wordPool.filter(w=>!ex||!ex.has(w.word));if(!pool.length)pool=wordPool;return pool[Math.floor(Math.random()*pool.length)];}
  function spawnIcon(lane,word,isTarget){const el=document.createElement("div");el.className="flying-icon";el.textContent=word.emoji;el.style.left="0%";el.style.top=(lane*(100/lanes))+"%";el.style.height=(100/lanes)+"%";playAreaTrack.appendChild(el);activeIcons.push({lane,word,isTarget,el,spawnTime:performance.now(),duration:crossDuration,removed:false,caughtHandled:false});}
  function spawnBatch(){const tl=Math.floor(Math.random()*lanes);const used=new Set([roundTarget.word]);for(let l=0;l<lanes;l++){if(l===tl){spawnIcon(l,roundTarget,true);}else{const w=pickWord(used);used.add(w.word);spawnIcon(l,w,false);}}}
  function targetActive(){return activeIcons.some(i=>i.isTarget&&!i.removed);}
  function scheduleRespawn(lane,delay){const t=setTimeout(()=>{if(!roundActive)return;const ft=!targetActive();const word=ft?roundTarget:(Math.random()<0.28?roundTarget:pickWord(new Set()));spawnIcon(lane,word,word.word===roundTarget.word);},delay||(400+Math.random()*400));respawnTimers.push(t);}
  function removeIcon(icon,correct){icon.removed=true;icon.el.classList.add(correct?"pop-correct":"pop-wrong");setTimeout(()=>{if(icon.el.parentNode)icon.el.parentNode.removeChild(icon.el);},460);}
  function clearIcons(){respawnTimers.forEach(t=>clearTimeout(t));respawnTimers=[];activeIcons.forEach(icon=>{if(!icon.removed){icon.removed=true;if(icon.el.parentNode)icon.el.parentNode.removeChild(icon.el);}});activeIcons=[];}

  function resolveCatch(icon){icon.caughtHandled=true;removeIcon(icon,icon.isTarget);playTone(icon.isTarget?"correct":"wrong");if(icon.isTarget){roundActive=false;clearTimeout(roundTimeoutId);respawnTimers.forEach(t=>clearTimeout(t));respawnTimers=[];activeIcons.forEach(other=>{if(other!==icon&&!other.removed){other.removed=true;other.el.style.transition="opacity .3s ease";other.el.style.opacity="0";setTimeout(()=>{if(other.el.parentNode)other.el.parentNode.removeChild(other.el);},320);}});score++;roundsPlayed++;updateHUD();
  const wcTimerOn2 = document.getElementById("wc-timer-toggle")?.checked !== false;
  const tp = document.getElementById("timePill");
  if(tp) tp.style.display = wcTimerOn2 ? "" : "none";showFeedback("good");correctAdvanceId=setTimeout(nextRound,CORRECT_WAIT_MS);}else{showFeedback("bad");scheduleRespawn(icon.lane,450);}}

  function animate(now){for(const icon of activeIcons){if(icon.removed)continue;let p=(now-icon.spawnTime)/icon.duration;if(p>1)p=1;const lp=p*90;icon.el.style.left=lp+"%";if(!icon.caughtHandled&&lp>=NET_ZONE_PCT&&icon.lane===netLane){resolveCatch(icon);continue;}if(!icon.caughtHandled&&p>=1){icon.caughtHandled=true;removeIcon(icon,false);if(roundActive)scheduleRespawn(icon.lane,250);}}rafId=requestAnimationFrame(animate);}

  function nextRound(){clearTimeout(correctAdvanceId);clearTimeout(roundTimeoutId);clearIcons();if(timeLeft<=0||roundsPlayed>=MAX_ROUNDS){endGame();return;}const excl=new Set(lastTargetWord?[lastTargetWord]:[]);roundTarget=pickWord(excl);lastTargetWord=roundTarget.word;speak(roundTarget.word);roundActive=true;spawnBatch();roundTimeoutId=setTimeout(()=>{roundActive=false;clearIcons();nextRound();},ROUND_TIMEOUT_MS);}

  function startGameTimer(){
  const wcTimerOn = document.getElementById("wc-timer-toggle")?.checked !== false;
  if(!wcTimerOn) return; // 無限時clearInterval(gameTimerId);gameTimerId=setInterval(()=>{timeLeft--;updateHUD();if(timeLeft<=10&&timeLeft>0)playTone("tick");if(timeLeft<=0){clearInterval(gameTimerId);endGame();}},1000);}

  function startGame(){ensureAudio();levelData=LEVELS[selectedLevel];wordPool=levelData.words;lanes=levelData.lanes;crossDuration=levelData.baseCross*speedMultiplier;score=0;roundsPlayed=0;timeLeft=GAME_SECONDS;lastTargetWord=null;netLane=Math.floor(lanes/2);startScreen.hidden=true;endScreen.hidden=true;gameScreen.hidden=false;buildRefPanel();buildLanes();updateNet();updateHUD();cancelAnimationFrame(rafId);rafId=requestAnimationFrame(animate);startGameTimer();nextRound();}
  function endGame(){roundActive=false;clearInterval(gameTimerId);clearTimeout(roundTimeoutId);clearTimeout(correctAdvanceId);clearIcons();cancelAnimationFrame(rafId);if(window.speechSynthesis)window.speechSynthesis.cancel();playTone("end");gameScreen.hidden=true;endScreen.hidden=false;resultScore.textContent=score+" / "+roundsPlayed;const rate=roundsPlayed>0?Math.round((score/roundsPlayed)*100):0;resultSub.textContent="答對率 "+rate+"%";resultEmoji.textContent=rate>=80?"🏆":rate>=50?"🎉":"💪";}
  function resetToStart(){roundActive=false;clearInterval(gameTimerId);clearTimeout(roundTimeoutId);clearTimeout(correctAdvanceId);clearIcons();cancelAnimationFrame(rafId);if(window.speechSynthesis)window.speechSynthesis.cancel();endScreen.hidden=true;gameScreen.hidden=true;startScreen.hidden=false;}

  startBtn.addEventListener("click",startGame);
  retryBtn.addEventListener("click",startGame);
  changeLevelBtn.addEventListener("click",resetToStart);
  quitBtn.addEventListener("click",endGame);
  replayWordBtn.addEventListener("click",()=>{if(roundTarget){ensureAudio();speak(roundTarget.word);}});
})();
</script>
