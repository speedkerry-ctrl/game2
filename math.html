.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px solid transparent;}
.back{background:#e8e8e4;border-color:#d5d5d0;}

.front{transform:rotateY(180deg);gap:3px;border-color:#e5e5e5;}

.front.ans-card .c-main{font-weight:700;color:#1a1a1a;}

.flip-p1 .back{background:#DBEAFE;border-color:#93C5FD;}
.flip-p2 .back{background:#FCE7F3;border-color:#F9A8D4;}
.done-p1 .front{background:#DBEAFE!important;border-color:#60A5FA!important;}.done-p1 .front .c-main{color:#1E40AF!important;}
.done-p2 .front{background:#FCE7F3!important;border-color:#F472B6!important;}.done-p2 .front .c-main{color:#9D174D!important;}
.done-solo .front{background:#DCFCE7!important;border-color:#86EFAC!important;}.done-solo .front .c-main{color:#166534!important;}
@keyframes wrongShake{0%,100%{transform:rotateY(180deg) translateX(0);}25%{transform:rotateY(180deg) translateX(-5px);}75%{transform:rotateY(180deg) translateX(5px);}}
.cell.wrong .inner{animation:wrongShake .3s ease;}
.cell.wrong .front{background:#FEE2E2!important;border-color:#FCA5A5!important;}
@keyframes popDone{0%{transform:rotateY(180deg) scale(.85);}60%{transform:rotateY(180deg) scale(1.07);}100%{transform:rotateY(180deg) scale(1);}}
.done-p1 .inner,.done-p2 .inner,.done-solo .inner{animation:popDone .28s ease forwards;}

  #timer-toggle:checked + span { background: #185FA5; }

<script>
// ── 跨平台音效（iOS + Android + 桌機）────────────────────
let audioUnlocked = false;
let voiceZH = null;

// 等語音清單載入後挑選中文聲音
function loadVoice(){
  const voices = speechSynthesis.getVoices();
  // 優先找 zh-TW，其次 zh
  voiceZH = voices.find(v=>v.lang==='zh-TW')
           || voices.find(v=>v.lang.startsWith('zh'))
           || null;
}
if(window.speechSynthesis){
  loadVoice();
  // Android Chrome 語音清單是非同步載入
  speechSynthesis.addEventListener('voiceschanged', loadVoice);
}

// 第一次使用者互動時解鎖音效（iOS & Android 都需要）
function unlockAudio(){
  if(audioUnlocked || !window.speechSynthesis) return;
  const u = new SpeechSynthesisUtterance('');
  u.volume = 0; u.lang = 'zh-TW';
  speechSynthesis.speak(u);
  audioUnlocked = true;
  // 順便再抓一次 voice
  loadVoice();
}
document.addEventListener('touchstart', unlockAudio, {once:true});
document.addEventListener('mousedown',  unlockAudio, {once:true});

// Android 長句會中途停止的 workaround：paused 時自動 resume
let resumeTimer = null;
function keepAlive(){
  resumeTimer = setInterval(()=>{
    if(window.speechSynthesis && speechSynthesis.paused){
      speechSynthesis.resume();
    }
  }, 200);
}
function stopKeepAlive(){ clearInterval(resumeTimer); }

function speak(text){
  if(!window.speechSynthesis) return;
  stopKeepAlive();
  speechSynthesis.cancel();
  // iOS 需要 cancel 後稍等；Android 不介意
  setTimeout(()=>{
    const u = new SpeechSynthesisUtterance(text);
    u.lang    = 'zh-TW';
    u.rate    = 0.95;
    u.pitch   = 1.05;
    u.volume  = 1;
    if(voiceZH) u.voice = voiceZH;
    u.onstart = ()=>keepAlive();
    u.onend   = ()=>stopKeepAlive();
    u.onerror = ()=>stopKeepAlive();
    speechSynthesis.speak(u);
  }, 60);
}
function speakEq(eq){
  speak(eq.replace(/\+/g,'加').replace(/−/g,'減').replace(/×/g,'乘以').replace(/=/g,'等於'));
}

// ── 難度定義 ─────────────────────────────────────────────
const DIFFICULTIES = {
  add:[
    {lv:'Lv.1',name:'個位＋個位',eg:'3+5',   gen:()=>{const a=rn(1,9),b=rn(1,9);return{a,b,sym:'+',ans:a+b};}},
    {lv:'Lv.2',name:'個位＋十位',eg:'6+23',  gen:()=>{const a=rn(1,9),b=rn(10,50);return{a,b,sym:'+',ans:a+b};}},
    {lv:'Lv.3',name:'十位＋十位',eg:'24+35', gen:()=>{const a=rn(10,50),b=rn(10,50);return{a,b,sym:'+',ans:a+b};}},
    {lv:'Lv.4',name:'十位＋百位',eg:'45+123',gen:()=>{const a=rn(10,99),b=rn(100,500);return{a,b,sym:'+',ans:a+b};}},
    {lv:'Lv.5',name:'百位＋百位',eg:'123+456',gen:()=>{const a=rn(100,500),b=rn(100,500);return{a,b,sym:'+',ans:a+b};}},
  ],
  sub:[
    {lv:'Lv.1',name:'個位－個位',eg:'9−4',    gen:()=>{const b=rn(1,8),a=rn(b+1,9);return{a,b,sym:'−',ans:a-b};}},
    {lv:'Lv.2',name:'十位－個位',eg:'25−6',   gen:()=>{const b=rn(1,9),a=rn(11,50);return{a,b,sym:'−',ans:a-b};}},
    {lv:'Lv.3',name:'十位－十位',eg:'56−23',  gen:()=>{const b=rn(10,40),a=rn(b+2,99);return{a,b,sym:'−',ans:a-b};}},
    {lv:'Lv.4',name:'百位－十位',eg:'132−45', gen:()=>{const b=rn(10,99),a=rn(b+10,300);return{a,b,sym:'−',ans:a-b};}},
    {lv:'Lv.5',name:'百位－百位',eg:'500−123',gen:()=>{const b=rn(100,400),a=rn(b+10,999);return{a,b,sym:'−',ans:a-b};}},
  ],
  mul:[
    {lv:'Lv.1',name:'2、3 的乘法',eg:'2×4',  gen:()=>{const a=pick([2,3]),b=rn(1,9);return{a,b,sym:'×',ans:a*b};}},
    {lv:'Lv.2',name:'4、5 的乘法',eg:'4×7',  gen:()=>{const a=pick([4,5]),b=rn(1,9);return{a,b,sym:'×',ans:a*b};}},
    {lv:'Lv.3',name:'6、7 的乘法',eg:'6×8',  gen:()=>{const a=pick([6,7]),b=rn(1,9);return{a,b,sym:'×',ans:a*b};}},
    {lv:'Lv.4',name:'8、9 的乘法',eg:'8×7',  gen:()=>{const a=pick([8,9]),b=rn(1,9);return{a,b,sym:'×',ans:a*b};}},
    {lv:'Lv.5',name:'完整九九表', eg:'7×8',  gen:()=>{const a=rn(2,9),b=rn(2,9);return{a,b,sym:'×',ans:a*b};}},
  ],
  mix:[
    {lv:'Lv.1',name:'個位混合加減',eg:'3+5 / 8−3',    gen:()=>mixGen('easy')},
    {lv:'Lv.2',name:'十位混合加減',eg:'24+13 / 35−12', gen:()=>mixGen('mid')},
    {lv:'Lv.3',name:'含乘法混合', eg:'4×6 / 18+25',   gen:()=>mixGen('hard')},
  ],
};

function rn(a,b){return a+Math.floor(Math.random()*(b-a+1));}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function mixGen(lv){
  const ops={
    easy:[()=>{const a=rn(1,9),b=rn(1,9);return{a,b,sym:'+',ans:a+b};},
          ()=>{const b=rn(1,8),a=rn(b+1,9);return{a,b,sym:'−',ans:a-b};}],
    mid: [()=>{const a=rn(10,50),b=rn(10,50);return{a,b,sym:'+',ans:a+b};},
          ()=>{const b=rn(10,40),a=rn(b+2,99);return{a,b,sym:'−',ans:a-b};}],
    hard:[()=>{const a=rn(10,50),b=rn(10,50);return{a,b,sym:'+',ans:a+b};},
          ()=>{const b=rn(1,9),a=rn(b+1,30);return{a,b,sym:'−',ans:a-b};},
          ()=>{const a=rn(2,9),b=rn(2,9);return{a,b,sym:'×',ans:a*b};}],
  };
  return pick(ops[lv])();
}

let selModeVal='single',selSizeVal=4,selOpVal='add',selDiffIdx=0;
let cards=[],open=[],lock=false,tries=0,left=0,combo=0;
let scores=[0,0],pairs_by=[0,0],turn=0;
let PAIRS=8,COLS=4;

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;}

function selOp(el){
  document.querySelectorAll('.op-btn').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel'); selOpVal=el.dataset.op; selDiffIdx=0; renderDiffGrid();
}
function selSize(el){document.querySelectorAll('.size-btn').forEach(b=>b.classList.remove('sel'));el.classList.add('sel');selSizeVal=parseInt(el.dataset.size);}
function selMode(el){document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('sel'));el.classList.add('sel');selModeVal=el.dataset.mode;}
function goMenu(){speechSynthesis.cancel();show('screen-menu');}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function startGame(){show('screen-game');restartGame();}

function renderDiffGrid(){
  const diffs=DIFFICULTIES[selOpVal];
  const g=document.getElementById('diff-grid');
  // 動態 columns：手機2欄，≥600px 看數量
  const cols=diffs.length<=3?diffs.length:window.innerWidth>=600?diffs.length:2;
  g.style.gridTemplateColumns=`repeat(${cols},1fr)`;
  g.innerHTML='';
  diffs.forEach((d,i)=>{
    const el=document.createElement('div');
    el.className='diff-btn'+(i===selDiffIdx?' sel':'');
    el.innerHTML=`<span class="diff-lv">${d.lv}</span><span class="diff-name">${d.name}</span><span class="diff-eg">${d.eg}</span>`;
    el.onclick=()=>{selDiffIdx=i;renderDiffGrid();};
    g.appendChild(el);
  });
}

// ── 格子尺寸：依容器寬與欄數動態計算 ────────────────────
function calcCellSize(cols){
  const container=document.querySelector('.container');
  const padH=window.innerWidth>=900?80:window.innerWidth>=600?64:32;
  const w=container.offsetWidth - padH;
  const gap=6;
  const cellW=Math.floor((w - gap*(cols-1)) / cols);
  // 最小 52px，最大依平板放大
  return Math.min(Math.max(cellW,52), 130);
}

// 算式字型：根據字串長度 + 格子大小自動縮小
function eqFontSize(display, cellSize){
  const len=display.replace('=?','').length; // 不算=?
  const base=cellSize * 0.22;
  if(len<=3) return Math.round(base);
  if(len<=5) return Math.round(base*0.85);
  if(len<=7) return Math.round(base*0.72);
  return Math.round(base*0.60);
}

function genPairs(count){
  const diff=DIFFICULTIES[selOpVal][selDiffIdx];
  const usedEq=new Set(),usedAns=new Set(),pairs=[];
  let attempts=0;
  while(pairs.length<count && attempts<5000){
    attempts++;
    const {a,b,sym,ans}=diff.gen();
    const eqStr=`${a}${sym}${b}`;
    if(usedEq.has(eqStr)||usedAns.has(ans)) continue;
    usedEq.add(eqStr); usedAns.add(ans);
    pairs.push({eq:eqStr,ans});
  }
  return pairs;
}

function restartGame(){
  const timerEnabled = document.getElementById("timer-toggle")?.checked !== false;
  speechSynthesis.cancel();
  COLS=selSizeVal;
  PAIRS=selSizeVal===4?8:selSizeVal===6?18:32;

  const pairs=genPairs(PAIRS),deck=[];
  pairs.forEach((p,i)=>{
    deck.push({id:i,kind:'eq', display:p.eq+'=?',ans:p.ans,matched:false,owner:-1});
    deck.push({id:i,kind:'ans',display:String(p.ans),ans:p.ans,matched:false,owner:-1});
  });
  cards=shuffle(deck); open=[]; lock=false; tries=0; left=PAIRS; combo=0;
  scores=[0,0]; pairs_by=[0,0]; turn=0;
  document.getElementById('win-area').innerHTML='';
  document.getElementById('confetti').innerHTML='';

  const opLabels={add:'➕ 加法',sub:'➖ 減法',mul:'✖️ 乘法',mix:'🔀 混合'};
  const opCls={add:'add',sub:'sub',mul:'mul',mix:'mix'};
  const diff=DIFFICULTIES[selOpVal][selDiffIdx];
  document.getElementById('info-bar').innerHTML=
    `<span class="op-badge ${opCls[selOpVal]}">${opLabels[selOpVal]}</span>
     <span class="diff-badge">${diff.lv} ${diff.name}</span>`;

  setMsg('翻開算式牌或答案牌！','');
  renderTopbar(); renderGrid();
}

function renderTopbar(){
  const twb=document.getElementById('turn-bar-wrap'),tb=document.getElementById('topbar');
  if(selModeVal==='multi'){
    twb.innerHTML=`<div class="turn-bar">
      <div class="turn-chip p1${turn===0?' active':''}"><div class="chip-score">${scores[0]}</div><div class="chip-label">P1${turn===0?' ▶ 回合':''}</div></div>
      <div class="turn-chip p2${turn===1?' active':''}"><div class="chip-score">${scores[1]}</div><div class="chip-label">P2${turn===1?' ▶ 回合':''}</div></div>
    </div>`;
    tb.innerHTML=`<div class="stat"><div class="stat-label">剩餘</div><div class="stat-val">${left}</div></div>
                  <div class="stat"><div class="stat-label">翻牌</div><div class="stat-val">${tries}</div></div>`;
  }else{
    twb.innerHTML='';
    tb.innerHTML=`<div class="stat"><div class="stat-label">剩餘</div><div class="stat-val">${left}</div></div>
                  <div class="stat"><div class="stat-label">翻牌</div><div class="stat-val">${tries}</div></div>
                  <div class="combo-badge">x${combo} 連擊</div>`;
  }
}

function renderGrid(){
  const grid=document.getElementById('grid');
  const cellSize=calcCellSize(COLS);
  const ansSz=Math.max(Math.round(cellSize*0.30),14);
  const qSz  =Math.max(Math.round(cellSize*0.22),12);

  grid.style.gridTemplateColumns=`repeat(${COLS},1fr)`;
  grid.style.gap='6px'; grid.innerHTML='';

  cards.forEach((c,i)=>{
    const cell=document.createElement('div');
    const dc=selModeVal==='single'?'done-solo':(c.owner===0?'done-p1':'done-p2');
    cell.className='cell'+(c.matched?` flip ${dc}`:'');
    cell.style.height=cellSize+'px'; cell.dataset.i=i;

    const frontCls=c.kind==='eq'?'eq-card':'ans-card';
    let mainHTML;
    if(c.kind==='eq'){
      const fs=eqFontSize(c.display, cellSize);
      mainHTML=`<span class="c-main" style="font-size:${fs}px">${c.display}</span>`;
    } else {
      mainHTML=`<span class="c-main" style="font-size:${ansSz}px">${c.display}</span>`;
    }

    cell.innerHTML=`<div class="inner">
      <div class="face back"><div class="back-q" style="font-size:${qSz}px">${c.kind==='eq'?'📝':'🔢'}</div></div>
      <div class="face front ${frontCls}">${mainHTML}</div>
    </div>`;
    cell.addEventListener('click',()=>onTap(i));
    grid.appendChild(cell);
  });
}

function getEl(i){return document.querySelector('[data-i="'+i+'"]');}

function onTap(i){
  unlockAudio();
  if(lock)return;
  const c=cards[i]; if(c.matched||open.includes(i))return;
  const el=getEl(i);
  if(selModeVal==='multi') el.classList.add(turn===0?'flip-p1':'flip-p2');
  el.classList.add('flip');
  c.kind==='eq' ? speakEq(c.display) : speak(c.display);
  setMsg((c.kind==='eq'?'📝 ':'🔢 ')+c.display, selModeVal==='multi'?(turn===0?'p1c':'p2c'):'');
  open.push(i);

  if(open.length===2){
    tries++; renderTopbar();
    const[ai,bi]=open,a=cards[ai],b=cards[bi],ea=getEl(ai),eb=getEl(bi);
    const isMatch=a.id===b.id&&a.kind!==b.kind;
    if(isMatch){
      combo++; const pts=combo;
      setTimeout(()=>{
        a.matched=true;b.matched=true;a.owner=turn;b.owner=turn;
        const dc=selModeVal==='single'?'done-solo':(turn===0?'done-p1':'done-p2');
        ea.classList.remove('flip-p1','flip-p2');eb.classList.remove('flip-p1','flip-p2');
        ea.classList.add(dc);eb.classList.add(dc);
        const eqCard=a.kind==='eq'?a:b;
        if(selModeVal==='multi'){scores[turn]+=pts;pairs_by[turn]++;}
        else if(combo>1) spawnConfetti();
        setMsg(
          selModeVal==='multi'
            ?(turn===0?'P1':'P2')+' 配對！'+eqCard.display+(combo>1?' +'+pts:'')
            :'配對！'+eqCard.display+(combo>1?' ×'+combo+'！':''),
          selModeVal==='multi'?(turn===0?'p1c':'p2c'):'ok'
        );
        open=[];left--;renderTopbar();
        if(left<=0) setTimeout(()=>showResult(),500);
      },280);
    }else{
      combo=0;
      setTimeout(()=>{
        ea.classList.add('wrong');eb.classList.add('wrong');
        setMsg('不對！再試試','err'); lock=true;
        setTimeout(()=>{
          ea.classList.remove('flip','wrong','flip-p1','flip-p2');
          eb.classList.remove('flip','wrong','flip-p1','flip-p2');
          open=[];lock=false;
          if(selModeVal==='multi') turn=1-turn;
          renderTopbar();
          setMsg(selModeVal==='multi'?(turn===0?'P1 ▶':'P2 ▶'):'繼續！','');
        },800);
      },280);
    }
  }
}

function spawnConfetti(){
  const wrap=document.getElementById('confetti');wrap.innerHTML='';
  const cols=['#60A5FA','#F472B6','#34D399','#FBBF24','#F87171','#A78BFA'];
  for(let i=0;i<20;i++){
    const d=document.createElement('div');d.className='dot';
    d.style.cssText=`left:${5+Math.random()*90}%;background:${cols[i%cols.length]};animation-delay:${(Math.random()*.3).toFixed(2)}s;animation-duration:${(.9+Math.random()*.5).toFixed(2)}s;`;
    wrap.appendChild(d);
  }
  setTimeout(()=>wrap.innerHTML='',1600);
}

function showResult(){
  spawnConfetti();
  if(selModeVal==='single'){
    const t3=PAIRS<=8?10:PAIRS<=18?22:42,t2=PAIRS<=8?14:PAIRS<=18?30:58;
    const stars=tries<=t3?3:tries<=t2?2:1,acc=Math.round(PAIRS/tries*100);
    document.getElementById('win-area').innerHTML=`
      <div class="win-overlay">
        <div class="stars">${'★'.repeat(stars)+'☆'.repeat(3-stars)}</div>
        <div class="win-title">全部消除！</div>
        <div class="win-sub">翻了 ${tries} 次・正確率 ${acc}%</div>
        <div class="win-btn-row"><button onclick="goMenu()">← 選單</button><button onclick="restartGame()">再玩一局</button></div>

      <div class="g-result__divider" style="margin:10px 0;font-size:11px;color:#bbb;position:relative;text-align:center;">或</div>
      <div style="display:flex;gap:8px;">
        <button class="g-btn g-btn--ghost" style="flex:1;font-size:13px;padding:9px;" onclick="location.href='index.html'">🏠 回首頁</button>
        <button class="g-btn g-btn--ghost" style="flex:1;font-size:13px;padding:9px;" onclick="history.back()">← 返回</button>
      </div>
<div class="g-result-extra"></div>
      </div>`;
  }else{
    const tie=scores[0]===scores[1],wtext=tie?'平手！':'🏆 '+(scores[0]>scores[1]?'P1':'P2')+' 獲勝！';
    const p1w=scores[0]>=scores[1],p2w=scores[1]>=scores[0];
    document.getElementById('win-area').innerHTML=`
      <div class="win-overlay">
        <div class="win-title">${wtext}</div>
        <div class="score-cards">
          <div class="sc-card p1c${p1w?' winner':''}"><div class="sc-name p1c">P1</div><div class="sc-pts p1c">${scores[0]}</div><div class="sc-detail">${pairs_by[0]} 對</div></div>
          <div class="sc-card p2c${p2w?' winner':''}"><div class="sc-name p2c">P2</div><div class="sc-pts p2c">${scores[1]}</div><div class="sc-detail">${pairs_by[1]} 對</div></div>
        </div>
        <div class="win-sub">總翻牌 ${tries} 次</div>
        <div class="win-btn-row"><button onclick="goMenu()">← 選單</button><button onclick="restartGame()">再玩一局</button></div>
      </div>`;
  }
}

function setMsg(t,cls){const el=document.getElementById('msg');el.textContent=t;el.className='msg-bar '+cls;}

renderDiffGrid();
</script>

</html>
