/* =========================================================
   音效系統 (Web Audio API 合成音效)
========================================================= */
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx = null;
function ensureAudio() {
  if (!actx) actx = new AudioCtx();
  if (actx.state === 'suspended') actx.resume();
}
function beep(freq, duration, type='sine', startGain=0.2, when=0) {
  if (!actx) return;
  const osc = actx.createOscillator();
  const gain = actx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.value = startGain;
  osc.connect(gain);
  gain.connect(actx.destination);
  const t = actx.currentTime + when;
  osc.start(t);
  gain.gain.setValueAtTime(startGain, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
  osc.stop(t + duration + 0.02);
}
function playSuccessSound() {
  ensureAudio();
  // 上升音階
  [523,659,784,1047].forEach((f,i)=> beep(f, 0.18, 'triangle', 0.25, i*0.1));
}
function playFailSound() {
  ensureAudio();
  // 下降"放屁"音
  beep(180, 0.05, 'sawtooth', 0.25, 0);
  beep(140, 0.05, 'sawtooth', 0.25, 0.06);
  beep(100, 0.05, 'sawtooth', 0.25, 0.12);
  beep(70, 0.18, 'sawtooth', 0.25, 0.18);
}
function playClickSound() {
  ensureAudio();
  beep(440, 0.06, 'square', 0.12, 0);
}
function playTickSound() {
  ensureAudio();
  beep(880, 0.05, 'square', 0.08, 0);
}
function playGameWinSound() {
  ensureAudio();
  [523,659,784,1047,1318].forEach((f,i)=> beep(f, 0.25, 'triangle', 0.3, i*0.13));
}

/* 模糊比對：將輸入字串與關鍵字做雙向包含比對，
   單字（長度<=1）需完全相符，避免誤判 */
function fuzzyMatch(input, keyword) {
  const a = input.trim().toLowerCase();
  const b = keyword.trim().toLowerCase();
  if (!a) return false;
  if (a === b) return true;
  if (a.length <= 1 || b.length <= 1) return a === b;
  return a.includes(b) || b.includes(a);
}

function findMatchedKey(lvl, rawInput) {
  const val = rawInput.trim().toLowerCase();
  if (!val) return null;
  for (const key in lvl.keywords) {
    for (const kw of lvl.keywords[key]) {
      if (fuzzyMatch(val, kw)) return key;
    }
  }
  return null;
}

let wrongAttempts = 0;

const sceneEl = document.getElementById('scene');
const sceneTitleEl = document.getElementById('scene-title');
const hintTextEl = document.getElementById('hint-text');
const obstacleEl = document.getElementById('obstacle');
const playerEl = document.getElementById('player');
const wordInput = document.getElementById('word-input');
const castBtn = document.getElementById('cast-btn');
const levelLabel = document.getElementById('level-label');
const restartBtn = document.getElementById('restart-btn');
const messageBanner = document.getElementById('message-banner');
const timerBox = document.getElementById('timer-box');
const countdownWrap = document.getElementById('countdown-bar-wrap');
const countdownBar = document.getElementById('countdown-bar');
const winScreen = document.getElementById('win-screen');
const playAgainBtn = document.getElementById('play-again-btn');

function loadLevel(index) {
  clearTimer();
  levelSolved = false;
  wrongAttempts = 0;
  const lvl = LEVELS[index];
  levelLabel.textContent = `關卡 ${index+1} / ${LEVELS.length}`;
  sceneTitleEl.textContent = lvl.title;
  hintTextEl.textContent = lvl.hint;
  obstacleEl.textContent = lvl.obstacleEmoji;
  obstacleEl.style.opacity = 1;
  obstacleEl.style.transform = 'none';
  obstacleEl.classList.remove('fall-down','fly-away');
  obstacleEl.style.left = '60%';
  playerEl.style.left = '40px';
  playerEl.style.transform = 'none';
  wordInput.value = '';
  document.querySelectorAll('.summon-item').forEach(el => el.remove());

  if (lvl.timeLimit && (document.getElementById("magic-timer-toggle")?.checked !== false)) {
    timeLeft = lvl.timeLimit;
    timerBox.classList.add('show');
    countdownWrap.classList.add('show');
    timerBox.textContent = timeLeft;
    countdownBar.style.width = '100%';
    timerInterval = setInterval(() => {
      timeLeft -= 1;
      timerBox.textContent = timeLeft;
      countdownBar.style.width = (timeLeft / lvl.timeLimit * 100) + '%';
      if (timeLeft <= 3 && timeLeft > 0) playTickSound();
      if (timeLeft <= 0) {
        clearTimer();
        if (!levelSolved) failLevel("時間到！");
      }
    }, 1000);
  } else {
    timerBox.classList.remove('show');
    countdownWrap.classList.remove('show');
  }
}

function clearTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function normalizeInput(str) {
  return str.trim().toLowerCase();
}

function showMessage(text, type) {
  messageBanner.textContent = text;
  messageBanner.className = 'show ' + type;
  setTimeout(() => {
    messageBanner.className = '';
  }, 1400);
}

function spawnSummonItem(emoji, leftPercent) {
  const el = document.createElement('div');
  el.className = 'summon-item';
  el.textContent = emoji;
  el.style.left = leftPercent + '%';
  sceneEl.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

function spawnStars() {
  for (let i=0;i<8;i++){
    const star = document.createElement('div');
    star.className = 'star';
    star.textContent = '⭐';
    star.style.left = (30 + Math.random()*40) + '%';
    star.style.top = '50%';
    star.style.animationDelay = (i*0.07)+'s';
    sceneEl.appendChild(star);
    setTimeout(()=> star.remove(), 1200);
  }
}

function handleSubmit() {
  ensureAudio();
  if (levelSolved) return;
  const raw = wordInput.value;
  if (!raw.trim()) return;
  const lvl = LEVELS[currentLevelIndex];
  const matchedKey = findMatchedKey(lvl, raw);

  if (matchedKey) {
    const emoji = lvl.itemEmoji[matchedKey];
    spawnSummonItem(emoji, 55);
    solveLevel(lvl);
  } else {
    wrongAttempts++;
    // 惡作劇/趣味輸入：隨機掉落趣味小物，不解除障礙
    const funny = FUNNY_ITEMS[Math.floor(Math.random()*FUNNY_ITEMS.length)];
    spawnSummonItem(funny, 50 + Math.random()*15);
    obstacleEl.classList.add('shake');
    setTimeout(()=> obstacleEl.classList.remove('shake'), 400);
    playFailSound();

    if (wrongAttempts >= 3 && lvl.extraHint) {
      showMessage(lvl.extraHint, 'fail');
      wrongAttempts = 0; // 提示後重新計次，避免一直洗畫面
    } else {
      showMessage("咦？這個咒語好像沒有用，再試試別的吧！", 'fail');
    }
  }
  wordInput.value = '';
  wordInput.focus();
}

function solveLevel(lvl) {
  levelSolved = true;
  clearTimer();
  playSuccessSound();
  spawnStars();
  obstacleEl.classList.add('fly-away');
  showMessage(lvl.successMsg, 'success');
  playerEl.style.left = '75%';

  setTimeout(() => {
    if (currentLevelIndex < LEVELS.length - 1) {
      currentLevelIndex++;
      loadLevel(currentLevelIndex);
    } else {
      playGameWinSound();
      winScreen.classList.add('show');
    }
  }, 1500);
}

function failLevel(reason) {
  playFailSound();
  playerEl.classList.add('shake');
  showMessage("哎呀！" + reason + " 再試一次吧！", 'fail');
  setTimeout(() => {
    playerEl.classList.remove('shake');
    loadLevel(currentLevelIndex);
  }, 1500);
}

/* =========================================================
   事件綁定
========================================================= */
castBtn.addEventListener('click', handleSubmit);
wordInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') handleSubmit();
});
restartBtn.addEventListener('click', () => {
  playClickSound();
  currentLevelIndex = 0;
  winScreen.classList.remove('show');
  loadLevel(currentLevelIndex);
});
playAgainBtn.addEventListener('click', () => {
  playClickSound();
  currentLevelIndex = 0;
  winScreen.classList.remove('show');
  loadLevel(currentLevelIndex);
});

/* 手機鍵盤遮擋處理：聚焦輸入框時，確保畫面可視範圍正確並捲動到輸入區 */
wordInput.addEventListener('focus', () => {
  ensureAudio();
  setTimeout(() => {
    wordInput.scrollIntoView({ block: 'end', behavior: 'smooth' });
  }, 250);
});

/* 第一次互動時啟動 AudioContext（瀏覽器政策要求使用者互動後才能播放） */
document.body.addEventListener('click', ensureAudio, { once: true });
document.body.addEventListener('touchstart', ensureAudio, { once: true });

/* 啟動遊戲 */
loadLevel(currentLevelIndex);
</script>

</body>
</html>
